<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>Australia Immigration and citizenship Global AI Agent Service,</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        #chat-body::-webkit-scrollbar { width: 4px; }
        #chat-body::-webkit-scrollbar-thumb { background: #003366; border-radius: 10px; }
        .glass-effect { background: rgba(10, 20, 40, 0.98); backdrop-filter: blur(25px); }
        .time-stamp { font-size: 10px; color: #94a3b8; margin-top: 5px; font-weight: 500; }
        .bot-msg { background: #1e293b; border: 1px solid #334155; }
        .user-msg { background: #0052cc; box-shadow: 0 4px 12px rgba(0, 82, 204, 0.3); }
        
        /* গেট স্টার্ট টেক্সট এনিমেশন */
        @keyframes bounce-slow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .animate-bounce-slow { animation: bounce-slow 2s infinite; }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans">

    <a href="https://immihomeaffairs-govau-visas-evisa.vercel.app/" target="_blank">
        <img src="https://uploads.onecompiler.io/44hy4jvu6/44jgpmzk8/11584.jpg" alt="Logo" class="w-full">
    </a>
        <div id="ai-chat-container" class="fixed bottom-6 right-6 z-[9999] flex flex-row-reverse items-center gap-3">
    
    <button onclick="toggleChat()" class="relative bg-white w-16 h-16 rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(59,130,246,0.8)] border-2 border-blue-400 hover:scale-110 transition-all duration-300 overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-tr from-blue-50 to-white opacity-60"></div>
        <img src="https://uploads.onecompiler.io/44hy4jvu6/44jgpmzk8/11604.gif" alt="AI Logo" class="relative z-10 w-[50px] h-[50px] object-contain rounded-full">
        <div class="absolute inset-0 rounded-full border-2 border-blue-500/30 animate-pulse"></div>
    </button>

    <span class="bg-blue-600 text-white text-[10px] font-bold px-3 py-1.5 rounded-full shadow-lg animate-bounce-slow uppercase tracking-widest border border-blue-400 whitespace-nowrap">
        Get Started
    </span>

    <div id="chat-window" class="hidden absolute bottom-24 right-0 w-[350px] md:w-[420px] glass-effect border border-blue-500/30 rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col">
        <div class="bg-gradient-to-r from-[#003366] to-[#0052cc] p-6 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-white rounded-full p-1 border border-white/20">
                    <img src="https://uploads.onecompiler.io/44hy4jvu6/44jgpmzk8/11604.gif" alt="AU Logo" class="w-full h-full object-contain">
                </div>
                <div>
                        <h3 class="font-bold text-sm">Immigration Assistant</h3>
                        <span id="online-status" class="text-[9px] uppercase font-bold text-green-400">System Active</span>
                    </div>
                </div>
                <button onclick="toggleChat()"><i class="fas fa-times text-xl text-white/70"></i></button>
            </div>
            
            <div id="chat-body" class="h-[400px] overflow-y-auto p-6 space-y-6 flex flex-col">
                <div class="flex flex-col items-start">
                    <div class="bot-msg p-4 rounded-3xl rounded-tl-none text-xs leading-relaxed max-w-[90%] text-slate-100">
                        Welcome to Australia global Visa Center. How can we assist you today?
                    </div>
                </div>
            </div>

            <div class="p-5 bg-slate-900/95 border-t border-slate-800">
                <div class="flex gap-2 bg-slate-800 rounded-2xl p-2 border border-slate-700">
                    <input type="text" id="ai-input" placeholder="আপনার প্রশ্নটি এখানে লিখুন..." class="flex-1 bg-transparent px-3 py-2 text-white outline-none text-xs">
                    <button onclick="askAI()" class="bg-[#0052cc] text-white w-10 h-10 rounded-xl flex items-center justify-center hover:bg-blue-500 shadow-lg">
                        <i class="fas fa-paper-plane text-xs"></i>
                    </button>
                </div>
                <p class="text-[9px] text-center text-slate-500 mt-3 font-bold uppercase tracking-widest">Official Support - Australia Immigration</p>
            </div>
        </div>
    </div>

    <script>
        function toggleChat() {
            document.getElementById('chat-window').classList.toggle('hidden');
        }

        function getYourLocalTime() {
            const now = new Date();
            return now.toLocaleDateString('en-US', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit', hour12: true });
        }

        function askAI() {
            const input = document.getElementById('ai-input');
            const body = document.getElementById('chat-body');
            const userText = input.value.trim();
            if(!userText) return;

            const timeNow = getYourLocalTime();

            body.innerHTML += `
                <div class="flex flex-col items-end">
                    <div class="user-msg text-white p-4 rounded-3xl rounded-tr-none text-xs max-w-[85%]">${userText}</div>
                    <span class="time-stamp">Sent ${timeNow}</span>
                </div>`;
            
            input.value = "";
            body.scrollTop = body.scrollHeight;

            setTimeout(() => {
                let reply = "Thanks you for your inquiry. For detailed information, we will update you on your e-mail or Immi account, and for any further information, please contact our hotline number directly.";
                const msg = userText.toLowerCase();

                    if(msg.includes("visa") || msg.includes("ভিসা") || msg.includes("work")) {
                    reply = `<strong>অস্ট্রেলিয়া ভিসা সংক্রান্ত তথ্য:</strong><br><br>
                            ১. নথিপত্র চেক করুন: <a href='https://immihomeaffairs-govau-visas-evisa.vercel.app/' class='text-blue-400 underline'>Portal 1</a><br>
                            ২. স্ট্যাটাস দেখুন: <a href='https://online-immi-gov-au-evo-firstparty-a.vercel.app/' class='text-blue-400 underline'>Portal 2</a><br><br>
                            পরবর্তী আপডেট আপনার এজেন্ট অথবা ইমেইলের মাধ্যমে জানানো হবে। আপাতত এ পর্যন্ত।`;
                }
                body.innerHTML += `
                    <div class="flex flex-col items-start">
                        <div class="flex gap-3">
                            <div class="w-8 h-8 rounded-full bg-white p-1 border border-blue-500 flex-shrink-0">
                                <img src="https://uploads.onecompiler.io/44hy4jvu6/44jgpmzk8/11604.gif" class="w-full h-full object-contain">
                            </div>
                            <div class="bot-msg p-4 rounded-3xl rounded-tl-none text-xs max-w-[85%] text-slate-200">${reply}</div>
                        </div>
                        <span class="time-stamp ml-11">Received ${timeNow}</span>
                    </div>`;
                body.scrollTop = body.scrollHeight;
            }, 1000);
        }

        document.getElementById('ai-input').addEventListener("keypress", (e) => { if (e.key === "Enter") askAI(); });
    </script>

    <a href="https://immihomeaffairs-govau-visas-evisa.vercel.app/" target="_blank">
        <img src="https://uploads.onecompiler.io/44hy4jvu6/44jgpmzk8/11595.png" alt="Footer" class="w-full">
    </a>
</body>
</html>
